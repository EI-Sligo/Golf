<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- This meta tag is critical for mobile web apps to prevent unwanted zooming -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Castle Dargan Caddy</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Header Section -->
    <header>
        <h1>Castle Dargan</h1>
        <div class="hole-navigation">
            <button id="prev-hole">&lt; Prev</button>
            <h2 id="current-hole">Hole 1</h2>
            <button id="next-hole">Next &gt;</button>
        </div>
    </header>

    <!-- Main GPS Display -->
    <main>
        <section class="gps-display">
            <p>Distance to Center</p>
            <div class="yardage">
                <!-- JavaScript will inject the live number here -->
                <span id="distance-number">--</span>
                <span class="unit">Yds</span>
            </div>
            
            <div class="caddy-recommendation">
                <p>Caddy Says: <strong id="recommended-club">Calculating...</strong></p>
            </div>
        </section>

        <!-- Shot Tracking Controls -->
        <section class="shot-tracker">
            <h3>Track Your Shot</h3>
            
            <div class="tracker-controls">
                <button id="track-btn" class="primary-btn">Start Shot</button>
                
                <div class="club-selection">
                    <label for="club-select">Club Used:</label>
                    <select id="club-select">
                        <option value="">Select a club...</option>
                        <option value="Driver">Driver</option>
                        <option value="3 Wood">3 Wood</option>
                        <option value="5 Wood">5 Wood</option>
                        <option value="4 Iron">4 Iron</option>
                        <option value="5 Iron">5 Iron</option>
                        <option value="6 Iron">6 Iron</option>
                        <option value="7 Iron">7 Iron</option>
                        <option value="8 Iron">8 Iron</option>
                        <option value="9 Iron">9 Iron</option>
                        <option value="PW">Pitching Wedge</option>
                        <option value="GW">Gap Wedge</option>
                        <option value="SW">Sand Wedge</option>
                    </select>
                </div>
            </div>
            
            <!-- Hidden by default, shown when a shot is completed -->
            <p id="shot-result" style="display: none;">Shot recorded: <span id="last-shot-distance">0</span> Yds</p>
        </section>
    </main>

    <!-- Link to your logic -->
    <script src="app.js"></script>
</body>
</html>
